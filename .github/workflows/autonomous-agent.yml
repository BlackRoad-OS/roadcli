# .github/workflows/autonomous-agent.yml
# Automated CI validation on PRs with auto-merge for trusted bots only

name: PR Automation

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: pr-automation-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint
        run: ruff check src/ --select E,F,W --ignore E501

      - name: Test
        run: python -m pytest tests/ -v

      - name: Report
        if: always()
        run: echo "Validation complete for PR #${{ github.event.pull_request.number }}"

  auto-merge-dependabot:
    needs: validate
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Auto-merge dependabot PRs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr merge ${{ github.event.pull_request.number }} \
            --repo ${{ github.repository }} \
            --auto --squash
